name: Publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish Windows x64 release
    runs-on: windows-2022
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}\target
      DASACLOUD_MSIX_PUBLISHER: ${{ secrets.DASACLOUD_MSIX_PUBLISHER }}
      DASACLOUD_PUBLISHER_DISPLAY_NAME: ${{ secrets.DASACLOUD_PUBLISHER_DISPLAY_NAME }}
      DASACLOUD_SIGNING_CERTIFICATE_BASE64: ${{ secrets.DASACLOUD_SIGNING_CERTIFICATE_BASE64 }}
      DASACLOUD_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.DASACLOUD_SIGNING_CERTIFICATE_PASSWORD }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate signing configuration
        shell: pwsh
        run: |
          $required = @("DASACLOUD_MSIX_PUBLISHER", "DASACLOUD_SIGNING_CERTIFICATE_BASE64", "DASACLOUD_SIGNING_CERTIFICATE_PASSWORD")
          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing) {
            throw "Production signing secrets are missing: $($missing -join ', ')"
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-msvc --profile minimal
          rustup default stable-x86_64-pc-windows-msvc

      - name: Build frontend
        shell: pwsh
        run: |
          corepack enable
          corepack yarn --cwd ui install --immutable
          corepack yarn --cwd ui build

      - name: Build DasaCloud
        shell: pwsh
        run: cargo build --package dasacloud-desktop --release --target x86_64-pc-windows-msvc

      - name: Restore signing certificate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path signing -Force | Out-Null
          [System.IO.File]::WriteAllBytes("signing\dasacloud-signing.pfx", [Convert]::FromBase64String($env:DASACLOUD_SIGNING_CERTIFICATE_BASE64))

      - name: Build signed MSIX and Setup executable
        shell: pwsh
        run: |
          .\build-msix.ps1 -Arch x64 -SkipBuild -OutputDir dist -Publisher $env:DASACLOUD_MSIX_PUBLISHER -PublisherDisplayName $env:DASACLOUD_PUBLISHER_DISPLAY_NAME -CertificatePath signing\dasacloud-signing.pfx -CertificatePassword $env:DASACLOUD_SIGNING_CERTIFICATE_PASSWORD
          .\build-installer.ps1 -PackagePath dist\DasaCloud.x64.msix -OutputPath dist\DasaCloud-Setup-x64.exe -SigningCertificatePath signing\dasacloud-signing.pfx -CertificatePassword $env:DASACLOUD_SIGNING_CERTIFICATE_PASSWORD

      - name: Write checksums
        shell: pwsh
        run: Get-FileHash dist\DasaCloud-Setup-x64.exe, dist\DasaCloud.x64.msix -Algorithm SHA256 | Format-List | Out-File -Encoding ascii dist\SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create $env:RELEASE_TAG dist\DasaCloud-Setup-x64.exe dist\DasaCloud.x64.msix dist\SHA256SUMS.txt --title "DasaCloud $env:RELEASE_TAG" --generate-notes
